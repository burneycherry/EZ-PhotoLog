<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EZ Photo Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif;
       background: #d0d0d0; color: #111; min-height: 100vh; user-select: none; }

/* ===== 操作パネル ===== */
#ctrl {
position: sticky; top: 0; z-index: 200;
background: #1c1c1c; color: #fff;
padding: 7px 12px;
display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
border-bottom: 2px solid #333;
}
#ctrl-title { font-size: 15px; font-weight: 800; letter-spacing: .1em; white-space: nowrap; color: #ffca28; }
.cb {
padding: 5px 10px; border: 1px solid #555; border-radius: 3px;
background: #2a2a2a; color: #fff; font-size: 12px; cursor: pointer;
white-space: nowrap; transition: background .12s; font-family: inherit;
}
.cb:hover { background: #3a3a3a; }
.cb.new  { }
.cb.lod  { background:#1e2d3d; border-color:#2d3d5a; }
.cb.sav  { background:#1e2d1e; border-color:#2d4a2d; }
.cb.add  { background:#1e3d1e; border-color:#2d5a2d; }
.cb.del  { background:#3d1e1e; border-color:#5a2d2d; }
.cb.prn  { background:#2d2d1e; border-color:#4a4a2d; }
.cb.bulk { background:#2a1e3d; border-color:#3d2d5a; }
.cb.cfg  { font-size: 14px; padding: 4px 9px; }
#pg-lbl  { font-size: 11px; color: #888; margin-left: 2px; }
.sep     { width: 1px; height: 20px; background: #444; flex-shrink: 0; }

/* ===== モーダル共通 ===== */
.overlay {
display: none; position: fixed; inset: 0; z-index: 500;
background: rgba(0,0,0,.6); align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
background: #fff; border-radius: 8px; padding: 20px 22px;
width: min(98vw, 860px); max-height: 92vh;
overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.4);
}
.modal h2 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.modal p  { font-size: 11px; color: #666; margin-bottom: 8px; line-height: 1.6; }
.modal-btn {
margin-top: 12px; width: 100%; padding: 7px;
background: #222; color: #fff; border: none; border-radius: 4px;
font-size: 12px; cursor: pointer; font-family: inherit;
}
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns button { flex:1; padding:7px; border:none; border-radius:4px; font-size:12px; cursor:pointer; font-family:inherit; }
.btn-cancel { background:#eee; color:#333; }
.btn-ok     { background:#c00; color:#fff; }

/* ===== 設定モーダル ===== */
.cfg-table { width:100%; border-collapse:collapse; font-size:11px; margin-top:6px; }
.cfg-table th { background:#f0f0f0; padding:4px 5px; text-align:center; border:1px solid #ddd; font-weight:700; font-size:10px; }
.cfg-table td { padding:3px 4px; border:1px solid #ddd; text-align:center; vertical-align:middle; }
.cfg-table tr:nth-child(even) td { background:#fafafa; }
.cfg-num-badge {
width:18px; height:18px; border-radius:50%;
background:#222; color:#fff; font-size:10px; font-weight:700;
display:inline-flex; align-items:center; justify-content:center;
}
.cfg-table select {
padding:2px 3px; border:1px solid #ccc; border-radius:3px;
font-size:10px; font-family:inherit; background:#fff; width:100%;
}

/* ===== ブック ===== */
#book { max-width:794px; margin:14px auto; display:flex; flex-direction:column; gap:14px; }

/* ===== ページ ===== */
.page { background:#fff; width:100%; padding:10mm 10mm; position:relative; box-shadow:0 2px 10px rgba(0,0,0,.2); }
.page-hdr {
display:flex; align-items:baseline; justify-content:space-between;
padding-bottom:2mm; border-bottom:1px solid #000; height:8mm;
}
.page-hdr-title { font-size:13px; font-weight:700; letter-spacing:.15em; }
.page-hdr-num   { font-size:11px; }
.pg-del {
position:absolute; top:4px; right:4px;
width:22px; height:22px; border-radius:50%;
background:#c00; color:#fff; border:none; font-size:13px; cursor:pointer;
display:flex; align-items:center; justify-content:center;
opacity:.6; transition:opacity .12s;
}
.pg-del:hover { opacity:1; }

/* ===== 写真ブロック ===== */
.photo-block {
display:flex; border:1px solid #000; border-top:none;
position:relative; transition:opacity .15s;
}
.photo-block:first-of-type { border-top:1px solid #000; }
.photo-gap { height:10mm; }

.photo-cell {
flex:0 0 58.2%; aspect-ratio:4/3;
border-right:1px solid #000;
position:relative; overflow:hidden; background:#ececec;
}
.photo-cell img { width:100%; height:100%; object-fit:contain; display:block; }
.photo-placeholder {
width:100%; height:100%;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:4px; color:#aaa; text-align:center; padding:8px;
pointer-events:none;
}
.photo-placeholder .ph-yohaku {
font-size:28px; font-weight:700; color:#bbb; letter-spacing:.2em;
}
.photo-placeholder .ph-sub { font-size:10px; color:#ccc; }

.photo-actions {
position:absolute; bottom:4px; left:4px;
display:flex; gap:3px; z-index:10;
opacity:0; transition:opacity .15s;
}
.photo-block:hover .photo-actions,
.photo-block.touch-hover .photo-actions { opacity:1; }
.pa-btn {
width:24px; height:24px; border-radius:3px;
background:rgba(0,0,0,.55); color:#fff; border:none;
font-size:13px; cursor:pointer; line-height:1;
display:flex; align-items:center; justify-content:center;
}
.drag-handle {
position:absolute; top:4px; left:4px; z-index:10;
width:22px; height:22px;
background:rgba(0,0,0,.45); border-radius:3px;
color:#fff; font-size:14px; cursor:grab;
display:none; align-items:center; justify-content:center;
opacity:0; transition:opacity .15s;
touch-action:none;
}
.photo-block:hover .drag-handle,
.photo-block.touch-hover .drag-handle { opacity:1; display:flex; }

.ph-clr {
position:absolute; top:4px; right:4px; z-index:10;
width:21px; height:21px; border-radius:50%;
background:rgba(0,0,0,.45); color:#fff; border:none;
font-size:12px; cursor:pointer;
display:none; align-items:center; justify-content:center;
}
.photo-block:hover .ph-clr,
.photo-block.touch-hover .ph-clr { display:flex; }

.photo-cell-tap { position:absolute; inset:0; cursor:pointer; z-index:5; }

/* コメント欄 */
.comment-cell { flex:1; display:flex; flex-direction:column; }
.comment-row  { flex:1; border-bottom:1px solid #ccc; min-height:0; }
.comment-row:last-child { border-bottom:none; }
.comment-ta {
width:100%; height:100%; border:none; outline:none; resize:none;
font-family:inherit; padding:3px 5px;
background:transparent; line-height:1.35; color:#111;
display:block;
}

#drag-ghost {
position:fixed; pointer-events:none; z-index:9999;
opacity:.75; transform:scale(.92);
border:2px solid #333; background:#fff;
width:120px; height:90px; overflow:hidden;
display:none;
}
#drag-ghost img { width:100%; height:100%; object-fit:cover; }

#add-area { max-width:794px; margin:0 auto 28px; }
.add-large {
width:100%; padding:12px;
border:2px dashed #999; border-radius:4px;
background:#ebebeb; color:#666; font-size:12px;
cursor:pointer; transition:all .12s; font-family:inherit;
}

#file-input, #file-bulk, #file-load { display:none; }

/* ===== 印刷設定 (PC & iPad 最新OS最適化) ===== */
@media print {
  @page { 
    size: A4 portrait; 
    margin: -5mm !important; /* URL印字を物理的に追い出す */
  }
  html, body { 
    background:#fff; 
    width: 210mm; 
    height: 297mm;
    overflow: visible !important;
  }
  #ctrl, #add-area, .pg-del, .ph-clr, .overlay, .photo-actions, .drag-handle, #drag-ghost,
  .ph-sub, .photo-cell-tap, #help-section { display:none !important; }
  
  #book { 
    max-width: 100%; 
    margin: 0; 
    gap: 0; 
  }
  .page { 
    width: 210mm;
    height: 297mm;
    padding: 15mm 12mm; /* 外側を広げた分、内側余白で安全圏を確保 */
    box-shadow: none; 
    page-break-after: always; 
    break-after: page; 
    overflow: hidden;
    box-sizing: border-box;
    background: #fff !important;
  }
  .photo-cell { background:#e8e8e8 !important; -webkit-print-color-adjust: exact; }
}

/* 使い方セクション */
#help-section { max-width: 794px; margin: 12px auto 0; background: #fff; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.15); overflow: hidden; }
#help-toggle { width: 100%; padding: 10px 16px; background: #2a2a2a; color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 700; font-family: inherit; }
#help-body { display: none; }
#help-body.open { display: block; }
.help-tabs { display: flex; flex-wrap: wrap; border-bottom: 2px solid #e0e0e0; background: #f8f8f8; padding: 0 8px; }
.help-tab { padding: 9px 14px; font-size: 12px; cursor: pointer; border: none; background: none; font-family: inherit; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .12s; }
.help-tab.active { color: #111; font-weight: 700; border-bottom-color: #222; }
.help-pane { display: none; padding: 16px 18px 18px; }
.help-pane.active { display: block; }
.help-pane h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; }
.help-pane p { font-size: 12px; line-height: 1.8; color: #333; margin-bottom: 10px; }
.help-step { display: flex; gap: 12px; margin-bottom: 10px; }
.help-step-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: #222; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.help-note { background: #f5f5f5; border-left: 3px solid #999; padding: 8px 12px; font-size: 11px; color: #555; margin-top: 8px; }
.help-tag { display: inline-block; padding: 1px 7px; border-radius: 3px; background: #222; color: #fff; font-size: 10px; font-weight: 700; }
</style>
</head>
<body>

<div id="drag-ghost"><img id="drag-ghost-img" src="" alt=""></div>

<div id="ctrl">
  <span id="ctrl-title">EZ PHOTO LOG</span>
  <div class="sep"></div>
  <button class="cb new" onclick="confirmNew()">📄 新規</button>
  <button class="cb lod" onclick="document.getElementById('file-load').click()">📂 開く</button>
  <button class="cb sav" onclick="saveJSON()">💾 保存</button>
  <div class="sep"></div>
  <button class="cb bulk" onclick="openBulk()">🖼 まとめて追加</button>
  <div class="sep"></div>
  <button class="cb add" onclick="addPage()">＋ ページ追加</button>
  <button class="cb del" onclick="deleteLastPage()">－ 最終ページ削除</button>
  <div class="sep"></div>
  <button class="cb prn" onclick="doPrint()">🖨 印刷/PDF</button>
  <button class="cb cfg" onclick="openCfg()" title="設定">⚙</button>
  <span id="pg-lbl"></span>
</div>

<div id="help-section">
  <button id="help-toggle" onclick="toggleHelp()">
    <span>📖 使い方ガイド (v11: iPad印刷最適化済み)</span>
    <span class="arrow">▼</span>
  </button>
  <div id="help-body">
    <div class="help-tabs" id="help-tabs"></div>
    <div id="help-panes"></div>
  </div>
</div>

<div id="prn-overlay" class="overlay" onclick="if(event.target===this)closePrn()">
  <div class="modal" style="max-width:380px;">
    <h2>🖨 印刷 / PDF出力</h2>
    <p>印刷ダイアログの「倍率」を必ず <strong>100%</strong> に設定してください。</p>
    <div class="help-note">
      iPadの場合：共有 ＞ プリント ＞ <strong>サイズ調整 100%</strong><br>
      PCの場合：倍率 ＞ <strong>100</strong> または <strong>ページに合わせる</strong>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePrn()">キャンセル</button>
      <button class="btn-ok" style="background:#1e3d1e;" onclick="closePrn();window.print()">印刷ダイアログを開く</button>
    </div>
  </div>
</div>

<div id="new-overlay" class="overlay" onclick="if(event.target===this)closeNew()">
  <div class="modal">
    <h2>新規作成</h2>
    <p style="color:#c00;font-weight:700;">⚠ 現在の内容は保存されません。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNew()">キャンセル</button>
      <button class="btn-ok" onclick="doNew()">新規作成する</button>
    </div>
  </div>
</div>

<div id="cfg-overlay" class="overlay" onclick="if(event.target===this)closeCfg()">
  <div id="cfg-modal" class="modal">
    <h2>⚙ コメント欄 設定</h2>
    <table class="cfg-table">
      <thead>
        <tr><th>行</th><th>自動入力</th><th>サイズ</th><th>書体</th><th>装飾</th><th>配置</th><th>縦位置</th><th>ｲﾝﾃﾞﾝﾄ</th></tr>
      </thead>
      <tbody id="cfg-tbody"></tbody>
    </table>
    <button class="modal-btn" onclick="closeCfg()">設定を適用して閉じる</button>
  </div>
</div>

<div id="book"></div>
<div id="add-area">
  <button class="add-large" onclick="addPage()">＋ ページを追加</button>
</div>

<input type="file" id="file-input"  accept="image/*">
<input type="file" id="file-bulk"   accept="image/*" multiple>
<input type="file" id="file-load"   accept=".json">

<script>
// 基本ロジック（v11）
const CALS_MAX = 1280;
const CALS_QUAL = 0.72;
const PHOTOS_PER_PAGE = 3;

const AUTO_OPTIONS = [
  {v:'none', l:'手動'}, {v:'location', l:'施工場所'}, {v:'workType', l:'工種'},
  {v:'status', l:'状態'}, {v:'seq', l:'連番'}, {v:'filename', l:'ファイル名'}
];
const FONT_SIZES = [8,9,10,11,12,13,14,15,16,18,20,24,32];
const FONT_FAMILIES = [{v:'sans-serif', l:'ゴシック'}, {v:'serif', l:'明朝'}];
const ALIGN_OPTIONS = [{v:'left', l:'左'}, {v:'center', l:'中'}, {v:'right', l:'右'}, {v:'justify', l:'均等'}];
const VALIGN_OPTIONS = [{v:'top', l:'上'}, {v:'middle', l:'中'}, {v:'bottom', l:'下'}];

let pages = [];
let pageId = 0;
let rowCfg = Array.from({length:7}, (_,i) => ({
  autoFill: i===0?'location': i===1?'workType': i===2?'status': 'none',
  fontSize: 10, fontFamily: 'sans-serif', align: 'left', valign: 'top', indent: 0
}));

function makePhoto() { return {url:'', filename:'', comments:Array(7).fill('')}; }
function makePage()  { return {id:++pageId, photos:[makePhoto(),makePhoto(),makePhoto()]}; }

function getPhotoList() { return pages.flatMap(p => p.photos); }
function setPhotoList(list) {
  const need = Math.ceil(list.length / PHOTOS_PER_PAGE) || 1;
  while(pages.length < need) pages.push(makePage());
  while(pages.length > need) pages.pop();
  pages.forEach((pg, pi) => {
    for(let qi=0; qi<PHOTOS_PER_PAGE; qi++) pg.photos[qi] = list[pi*PHOTOS_PER_PAGE + qi] || makePhoto();
  });
}

function compressToCals(file, cb) {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    URL.revokeObjectURL(url);
    let w = img.naturalWidth, h = img.naturalHeight;
    if(w > CALS_MAX || h > CALS_MAX) {
      if(w >= h) { h = Math.round(h * CALS_MAX / w); w = CALS_MAX; }
      else { w = Math.round(w * CALS_MAX / h); h = CALS_MAX; }
    }
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(cv.toDataURL('image/jpeg', CALS_QUAL));
  };
  img.src = url;
}

function parseFilename(name) {
  const base = name.replace(/\.[^.]+$/, '');
  const p = base.split('_');
  return {location:p[0]||'', workType:p[1]||'', status:p[2]||'', seq:p[3]||'', filename:name};
}

function applyAutoFill(photo) {
  const parsed = parseFilename(photo.filename);
  rowCfg.forEach((cfg, ci) => { if(cfg.autoFill !== 'none') photo.comments[ci] = parsed[cfg.autoFill] || ''; });
}

function saveJSON() {
  const blob = new Blob([JSON.stringify({version:11, rowCfg, pages})], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'EZ_Photo_Log_'+new Date().getTime()+'.json';
  a.click();
}

document.getElementById('file-load').addEventListener('change', function(){
  const file = this.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    const d = JSON.parse(e.target.result);
    rowCfg = d.rowCfg || rowCfg; pages = d.pages;
    pageId = Math.max(0, ...pages.map(p=>p.id)); render();
  };
  r.readAsText(file);
});

function addPage() { pages.push(makePage()); render(); }
function deleteLastPage() { if(pages.length>1 && confirm('最終ページを削除？')) { pages.pop(); render(); } }
function deletePage(id) { if(pages.length>1 && confirm('このページを削除？')) { pages=pages.filter(p=>p.id!==id); render(); } }

function openBulk() {
  const fi = document.getElementById('file-bulk');
  fi.onchange = () => {
    const imgs = Array.from(fi.files).filter(f=>f.type.startsWith('image/'));
    const list = getPhotoList();
    let done = 0;
    imgs.forEach(file => {
      compressToCals(file, url => {
        const emptyIdx = list.findIndex(p => !p.url);
        const target = emptyIdx !== -1 ? list[emptyIdx] : null;
        if(target) { target.url=url; target.filename=file.name; applyAutoFill(target); }
        else { const p=makePhoto(); p.url=url; p.filename=file.name; applyAutoFill(p); list.push(p); }
        if(++done === imgs.length) { setPhotoList(list); render(); }
      });
    });
  };
  fi.click();
}

function openFileDialog(pid, qi) {
  const fi = document.getElementById('file-input');
  fi.onchange = () => {
    if(fi.files[0]) compressToCals(fi.files[0], url => {
      const p = pages.find(x=>x.id===pid);
      p.photos[qi].url=url; p.photos[qi].filename=fi.files[0].name;
      applyAutoFill(p.photos[qi]); render();
    });
  };
  fi.click();
}

function render() {
  const book = document.getElementById('book');
  book.innerHTML = '';
  pages.forEach((page, pi) => {
    const pEl = document.createElement('div');
    pEl.className='page'; pEl.id='p'+page.id;
    pEl.innerHTML = `<button class="pg-del" onclick="deletePage(${page.id})">×</button>
      <div class="page-hdr"><span class="page-hdr-title">工　事　写　真　帳</span>
      <span class="page-hdr-num">${pi+1} / ${pages.length}</span></div>`;

    page.photos.forEach((photo, qi) => {
      if(qi>0) { const g=document.createElement('div'); g.className='photo-gap'; pEl.appendChild(g); }
      const block = document.createElement('div');
      block.className='photo-block';
      
      const pCell = document.createElement('div');
      pCell.className='photo-cell';
      pCell.innerHTML = photo.url ? `<img src="${photo.url}">` : `<div class="photo-placeholder"><span class="ph-yohaku">余　白</span></div>`;
      const tap = document.createElement('div');
      tap.className='photo-cell-tap'; tap.onclick = () => openFileDialog(page.id, qi);
      pCell.appendChild(tap);
      block.appendChild(pCell);

      const cCell = document.createElement('div');
      cCell.className='comment-cell';
      photo.comments.forEach((txt, ci) => {
        const row = document.createElement('div'); row.className='comment-row';
        const cfg = rowCfg[ci];
        const ta = document.createElement('textarea');
        ta.className='comment-ta'; ta.value=txt;
        ta.style.fontSize = cfg.fontSize+'px'; ta.style.textAlign = cfg.align;
        ta.style.paddingLeft = (cfg.indent * 10) + 'px';
        ta.oninput = () => { photo.comments[ci] = ta.value; };
        row.appendChild(ta); cCell.appendChild(row);
      });
      block.appendChild(cCell);
      pEl.appendChild(block);
    });
    book.appendChild(pEl);
  });
  document.getElementById('pg-lbl').textContent = pages.length+' ページ';
}

function openCfg() {
  const tb = document.getElementById('cfg-tbody'); tb.innerHTML='';
  rowCfg.forEach((cfg, ci) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${ci+1}</td>
      <td><select onchange="rowCfg[${ci}].autoFill=this.value">${AUTO_OPTIONS.map(o=>`<option value="${o.v}" ${o.v===cfg.autoFill?'selected':''}>${o.l}</option>`).join('')}</select></td>
      <td><select onchange="rowCfg[${ci}].fontSize=parseInt(this.value)">${FONT_SIZES.map(s=>`<option value="${s}" ${s===cfg.fontSize?'selected':''}>${s}px</option>`).join('')}</select></td>
      <td>-</td><td>-</td>
      <td><select onchange="rowCfg[${ci}].align=this.value">${ALIGN_OPTIONS.map(o=>`<option value="${o.v}" ${o.v===cfg.align?'selected':''}>${o.l}</option>`).join('')}</select></td>
      <td>-</td>
      <td><input type="number" value="${cfg.indent}" min="0" max="9" style="width:40px" onchange="rowCfg[${ci}].indent=parseInt(this.value)"></td>`;
    tb.appendChild(tr);
  });
  document.getElementById('cfg-overlay').classList.add('open');
}
function closeCfg() { document.getElementById('cfg-overlay').classList.remove('open'); render(); }
function confirmNew() { if(confirm('全て消去して新規作成しますか？')) { pages=[makePage(),makePage(),makePage()]; render(); } }
function doPrint() { document.getElementById('prn-overlay').classList.add('open'); }
function closePrn() { document.getElementById('prn-overlay').classList.remove('open'); }
function toggleHelp() { document.getElementById('help-body').classList.toggle('open'); }

// 初期化
addPage(); addPage(); addPage(); render();
</script>
